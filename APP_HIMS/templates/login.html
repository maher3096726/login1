<!-- login.html - تحديث مؤشر الخطوات فقط -->
{% extends "base.html" %}

{% block title %}تسجيل البيانات{% endblock %}

{% block content %}
<div class="app-bar">
    <button class="back-btn" onclick="history.back()">
        <i class="fas fa-arrow-right"></i>
    </button>
    <h1>استخراج بيانات الطالب</h1>
    <button class="help-btn" onclick="showHelp()">
        <i class="fas fa-question"></i>
    </button>
</div>

<div class="content">
    <div class="alert" id="alert"></div>
    
    <!-- مؤشر الخطوات - نسخة محسنة -->
    <div class="steps-indicator">
        <div class="step" id="step1Indicator">
            <i class="fas fa-file-alt"></i> ورقة الاختيار
        </div>
        <div class="step" id="step2Indicator">
            <i class="fas fa-id-card"></i> البطاقة الشخصية
        </div>
    </div>
    
    <!-- باقي المحتوى كما هو دون تغيير -->
    <!-- قسم ورقة الاختيار -->
    <div id="cardSection" class="card">
        <h3 style="text-align: center; margin-bottom: 15px;">
            📄 ورقة الاختيار
        </h3>
        
        <div class="image-preview" id="cardPreview">
            <div class="image-preview-placeholder">
                <i class="fas fa-image"></i>
                <p>لم يتم رفع صورة ورقة الاختيار</p>
            </div>
        </div>
        
        <input type="file" id="cardInput" accept="image/*" style="display: none;">
        <button class="btn btn-primary" id="uploadCardBtn" style="width: 100%;">
            <i class="fas fa-camera"></i> تصوير ورقة الاختيار
        </button>
    </div>
    
    <!-- قسم البطاقة الشخصية (يظهر بعد تصوير ورقة الاختيار) -->
    <div id="idSection" class="card" style="display: none;">
        <h3 style="text-align: center; margin-bottom: 15px;">
            🆔 البطاقة الشخصية
        </h3>
        
        <div class="image-preview" id="idPreview">
            <div class="image-preview-placeholder">
                <i class="fas fa-id-card"></i>
                <p>انتظر حتى يتم التقاط الصورة...</p>
            </div>
        </div>
        
        <input type="file" id="idInput" accept="image/*" style="display: none;">
        <button class="btn btn-success" id="uploadIdBtn" style="width: 100%;">
            <i class="fas fa-camera"></i> تصوير البطاقة الشخصية
        </button>
    </div>
    
    <!-- البيانات المستخرجة (تظهر بعد اكتمال الخطوتين) -->
    <div id="dataSection" class="card" style="display: none;">
        <h3 style="margin-bottom: 15px; color: #f57c00;">
            <i class="fas fa-robot"></i> البيانات المستخرجة
        </h3>
        
        <div class="input-group">
            <label><i class="fas fa-user"></i> الاسم</label>
            <input type="text" id="nameField" readonly placeholder="...">
            <small id="nameDetails" style="display: block; color: #666; font-size: 12px; margin-top: 5px;"></small>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-hashtag"></i> رقم الجلوس</label>
            <input type="text" id="seatField" readonly placeholder="...">
            <small id="seatDetails" style="display: block; color: #666; font-size: 12px; margin-top: 5px;"></small>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-receipt"></i> رقم الإيصال</label>
            <input type="text" id="receiptField" readonly placeholder="...">
            <small id="receiptDetails" style="display: block; color: #666; font-size: 12px; margin-top: 5px;"></small>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-id-card"></i> الرقم القومي (14 رقم)</label>
            <input type="text" id="nationalIdField" readonly placeholder="...">
            <small id="nationalIdDetails" style="display: block; color: #666; font-size: 12px; margin-top: 5px;"></small>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-phone"></i> رقم الهاتف</label>
            <input type="text" id="phoneField" readonly placeholder="...">
            <small id="phoneDetails" style="display: block; color: #666; font-size: 12px; margin-top: 5px;"></small>
        </div>
    </div>
    
    <button class="btn btn-danger" id="saveFinalBtn" style="width: 100%; margin-top: 15px; display: none;" disabled>
        <i class="fas fa-save"></i> حفظ البيانات وإرسالها
    </button>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
</div>

<script>
    let cardImage = null;
    let idImage = null;
    let extractedData = {
        name: '', name_details: '',
        seat: '', seat_details: '',
        receipt_number: '', receipt_details: '',
        national_id: '', national_id_details: '',
        phone: '', phone_details: ''
    };
    
    const alertDiv = document.getElementById('alert');
    const loading = document.getElementById('loading');
    
    function showAlert(message, type) {
        alertDiv.className = `alert ${type}`;
        alertDiv.innerHTML = message;
        alertDiv.style.display = 'block';
        setTimeout(() => {
            alertDiv.style.display = 'none';
        }, 5000);
    }
    
    function showHelp() {
        showAlert('📋 الخطوات:\n1️⃣ قم بتصوير ورقة الاختيار أولاً\n2️⃣ قم بتصوير البطاقة الشخصية\n3️⃣ سيقوم النظام تلقائياً باستخراج جميع البيانات\n4️⃣ تأكد من صحة البيانات ثم اضغط حفظ', 'info');
    }
    
    function updatePreview(containerId, file) {
        const container = document.getElementById(containerId);
        const reader = new FileReader();
        reader.onload = function(e) {
            container.innerHTML = `<img src="${e.target.result}" alt="الصورة">`;
        };
        reader.readAsDataURL(file);
    }
    
    // استخراج البيانات من ورقة الاختيار
    async function extractFromCardAndWait(imageData) {
        loading.classList.add('active');
        try {
            const response = await fetch('/api/extract_card', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const result = await response.json();
            
            if (result.success && result.data) {
                extractedData = {
                    ...extractedData,
                    name: result.data.name || '',
                    name_details: result.data.name_details || '',
                    seat: result.data.seat || '',
                    seat_details: result.data.seat_details || '',
                    receipt_number: result.data.receipt_number || '',
                    receipt_details: result.data.receipt_details || '',
                    phone: result.data.phone || '',
                    phone_details: result.data.phone_details || '',
                    national_id: result.data.national_id || extractedData.national_id,
                    national_id_details: result.data.national_id_details || extractedData.national_id_details
                };
                showAlert('✅ تم حفظ بيانات ورقة الاختيار بنجاح. قم الآن بتصوير البطاقة الشخصية.', 'success');
                return true;
            } else {
                showAlert('❌ فشل استخراج البيانات من ورقة الاختيار: ' + (result.message || 'خطأ غير معروف'), 'error');
                return false;
            }
        } catch (error) {
            showAlert('❌ خطأ في الاتصال بالخادم', 'error');
            return false;
        } finally {
            loading.classList.remove('active');
        }
    }
    
    // استخراج الرقم القومي من البطاقة
    async function extractNationalIdAndCombine(imageData) {
        loading.classList.add('active');
        try {
            const response = await fetch('/api/extract_national_id', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            });
            const result = await response.json();
            
            if (result.success && result.national_id) {
                extractedData.national_id = result.national_id;
                extractedData.national_id_details = result.details;
                showAlert('✅ تم استخراج الرقم القومي من البطاقة بنجاح!', 'success');
                displayAllExtractedData();
                return true;
            } else {
                extractedData.national_id_details = result.message || '✗ لم يتم العثور على رقم قومي';
                displayAllExtractedData();
                showAlert('⚠️ لم يتم العثور على الرقم القومي في البطاقة. يمكنك إدخاله يدوياً أو إعادة المحاولة.', 'warning');
                return false;
            }
        } catch (error) {
            showAlert('❌ خطأ في الاتصال بالخادم', 'error');
            displayAllExtractedData();
            return false;
        } finally {
            loading.classList.remove('active');
        }
    }
    
    // عرض جميع البيانات المستخرجة
    function displayAllExtractedData() {
        document.getElementById('dataSection').style.display = 'block';
        document.getElementById('saveFinalBtn').style.display = 'block';
        
        document.getElementById('nameField').value = extractedData.name || '';
        document.getElementById('nameDetails').innerHTML = extractedData.name_details || '✗ لم يتم الاستخراج';
        document.getElementById('nameDetails').style.color = extractedData.name ? '#22c55e' : '#ef4444';
        
        document.getElementById('seatField').value = extractedData.seat || '';
        document.getElementById('seatDetails').innerHTML = extractedData.seat_details || '✗ لم يتم الاستخراج';
        document.getElementById('seatDetails').style.color = extractedData.seat ? '#22c55e' : '#ef4444';
        
        document.getElementById('receiptField').value = extractedData.receipt_number || '';
        document.getElementById('receiptDetails').innerHTML = extractedData.receipt_details || '✗ لم يتم الاستخراج';
        document.getElementById('receiptDetails').style.color = extractedData.receipt_number ? '#22c55e' : '#ef4444';
        
        document.getElementById('nationalIdField').value = extractedData.national_id || '';
        document.getElementById('nationalIdDetails').innerHTML = extractedData.national_id_details || '✗ لم يتم الاستخراج';
        document.getElementById('nationalIdDetails').style.color = extractedData.national_id ? '#22c55e' : '#ef4444';
        
        document.getElementById('phoneField').value = extractedData.phone || '';
        document.getElementById('phoneDetails').innerHTML = extractedData.phone_details || '✗ لم يتم الاستخراج';
        document.getElementById('phoneDetails').style.color = extractedData.phone ? '#22c55e' : '#ef4444';
        
        const saveBtn = document.getElementById('saveFinalBtn');
        if (extractedData.seat && extractedData.seat !== '') {
            saveBtn.disabled = false;
            if (extractedData.national_id) {
                showAlert('✅ جميع البيانات جاهزة! يمكنك الآن الحفظ.', 'success');
            } else {
                showAlert('⚠️ الرقم القومي غير موجود. يمكنك إدخاله يدوياً قبل الحفظ.', 'warning');
            }
        } else {
            saveBtn.disabled = true;
            showAlert('❌ لم يتم العثور على رقم الجلوس. يرجى إعادة تصوير ورقة الاختيار.', 'error');
        }
    }
    
    // حفظ البيانات النهائية
    async function saveAllData() {
        if (!extractedData.seat) {
            showAlert('❌ لا يوجد رقم جلوس. يرجى إعادة تصوير ورقة الاختيار.', 'error');
            return;
        }
        
        loading.classList.add('active');
        try {
            const response = await fetch('/api/save_student', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    student_data: {
                        name: extractedData.name,
                        phone: extractedData.phone,
                        seat: extractedData.seat,
                        national_id: extractedData.national_id,
                        receipt_number: extractedData.receipt_number,
                        confidence: extractedData.national_id ? 90 : 70
                    },
                    card_image: cardImage,
                    id_image: idImage
                })
            });
            const result = await response.json();
            if (result.success) {
                showAlert('🎉 تم حفظ البيانات بنجاح! جاري التحويل...', 'success');
                setTimeout(() => { window.location.href = '/next'; }, 1500);
            } else {
                showAlert('⚠️ تم الحفظ محلياً', 'warning');
            }
        } catch (error) {
            showAlert('⚠️ تم الحفظ محلياً بسبب خطأ في الاتصال', 'warning');
        } finally {
            loading.classList.remove('active');
        }
    }
    
    // التدفق الرئيسي
    document.getElementById('uploadCardBtn').onclick = () => document.getElementById('cardInput').click();
    document.getElementById('cardInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        updatePreview('cardPreview', file);
        
        const reader = new FileReader();
        reader.onload = async function(event) {
            cardImage = event.target.result;
            const success = await extractFromCardAndWait(cardImage);
            if (success) {
                document.getElementById('cardSection').style.display = 'none';
                document.getElementById('idSection').style.display = 'block';
                document.getElementById('step1Indicator').classList.remove('active');
                document.getElementById('step1Indicator').classList.add('completed');
                document.getElementById('step2Indicator').classList.add('active');
                showAlert('📸 قم الآن بتصوير البطاقة الشخصية لاستخراج الرقم القومي', 'info');
            } else {
                showAlert('❌ فشل استخراج البيانات، حاول مرة أخرى مع صورة أوضح', 'error');
                document.getElementById('cardInput').value = '';
            }
        };
        reader.readAsDataURL(file);
    };
    
    document.getElementById('uploadIdBtn').onclick = () => document.getElementById('idInput').click();
    document.getElementById('idInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        updatePreview('idPreview', file);
        
        const reader = new FileReader();
        reader.onload = async function(event) {
            idImage = event.target.result;
            await extractNationalIdAndCombine(idImage);
            document.getElementById('step2Indicator').classList.remove('active');
            document.getElementById('step2Indicator').classList.add('completed');
        };
        reader.readAsDataURL(file);
    };
    
    document.getElementById('saveFinalBtn').onclick = saveAllData;
</script>
{% endblock %}
