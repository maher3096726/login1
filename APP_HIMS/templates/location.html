{% extends "base.html" %}

{% block title %}موقع المعهد{% endblock %}

{% block content %}
<div class="app-bar app-bar-green">
    <button class="back-btn" onclick="location.href='/'">
        <i class="fas fa-arrow-right"></i>
    </button>
    <h1>موقع المعهد</h1>
    <div style="width: 40px;"></div>
</div>

<div class="content" style="display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
    <h2 class="text-success" style="margin: 20px 0;">📍 عنوان المعهد</h2>
    
    <div class="card" style="background: #e8f5e9;">
        <p style="font-size: 18px; font-weight: bold;">
            المعهد العالي للعلوم الإدارية<br>
            بلقاس - محافظة الدقهلية<br>
            جمهورية مصر العربية
        </p>
    </div>
    
    <div style="margin: 20px 0;">
        <i class="fas fa-map-marker-alt" style="font-size: 80px; color: #d32f2f;"></i>
    </div>
    
    <div class="card">
        <p>للوصول إلى المعهد:<br>
        يمكنك استخدام خرائط جوجل<br>
        أو وسائل النقل العام المتاحة</p>
    </div>
    
    <button class="btn btn-primary" onclick="window.open('https://maps.app.goo.gl/6AUpzvmbZDQ9cZYD8', '_blank')" style="margin: 10px 0;">
        <i class="fas fa-map"></i> فتح خرائط جوجل
    </button>
    
    <button class="btn btn-secondary" onclick="location.href='/'" style="background: #757575;">
        <i class="fas fa-home"></i> العودة للرئيسية
    </button>
</div>
{% endblock %}
